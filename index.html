<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark SMP | Official Rankings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Montserrat:ital,wght@0,400;0,900;1,900&display=swap');
        
        body { background-color: #0d1117; color: #c9d1d9; font-family: 'Montserrat', sans-serif; margin: 0; overflow-x: hidden; min-height: 100vh; position: relative; }
        h1, .tier-header, .nav-btn { font-family: 'Orbitron', sans-serif; letter-spacing: 2px; }
        .header-container { display: flex; flex-direction: column; align-items: center; gap: 1rem; margin-bottom: 2rem; padding: 1rem; }
        @media (min-width: 768px) { .header-container { flex-direction: row; justify-content: space-between; } }
        
        .discord-btn {
            background: #161b22; border: 1px solid #30363d; padding: 8px 16px; border-radius: 10px;
            font-size: 11px; font-weight: 800; text-transform: uppercase; color: #8b949e; 
            cursor: pointer; display: flex; align-items: center; gap: 8px; transition: 0.2s ease; text-decoration: none;
        }
        .discord-btn:hover { transform: translateY(-4px); border-color: #f85149; box-shadow: 0 4px 15px rgba(248, 81, 73, 0.2); color: white; }

        .mode-nav { display: flex; gap: 10px; margin-bottom: 30px; overflow-x: auto; padding: 15px 5px; scrollbar-width: none; }
        .mode-nav::-webkit-scrollbar { display: none; }
        
        .nav-btn {
            background: #161b22; border: 1px solid #30363d; padding: 8px 18px; border-radius: 10px;
            font-size: 10px; font-weight: 900; text-transform: uppercase; color: #8b949e; 
            cursor: pointer; display: flex; align-items: center; gap: 8px; white-space: nowrap; transition: 0.2s ease;
        }
        .nav-btn:hover { transform: translateY(-4px); border-color: #f85149; color: white; }
        .nav-btn.active { background: #21262d; color: white; border: 1px solid #f85149; box-shadow: 0 0 10px rgba(248, 81, 73, 0.3); }

        .overall-card { 
            background: rgba(22, 27, 34, 0.6); border: 1px solid #30363d; border-radius: 12px;
            padding: 12px 16px; display: flex; align-items: center; margin-bottom: 10px; cursor: pointer; transition: 0.2s ease;
        }
        .overall-card:hover { transform: scale(1.01); border-color: #f85149; background: #1c2128; }

        /* FIX: Prevent long names from breaking modal */
        .modal-ign { 
            font-family: 'Montserrat', sans-serif; font-weight: 900; font-style: italic; 
            text-transform: uppercase; font-size: 1.8rem; text-align: center; 
            letter-spacing: -1px; margin-bottom: 1rem;
            word-wrap: break-word; overflow-wrap: break-word; /* This stops the text going across the menu */
            max-width: 100%; line-height: 1.1;
        }

        .tier-pill { background: #0d1117; padding: 12px; border-radius: 12px; border: 1px solid #30363d; text-align: center; }
        .tier-badge-group { display: flex; gap: 8px; margin-left: auto; }
        .badge-item { display: flex; flex-direction: column; align-items: center; min-width: 35px; }
        .badge-icon-box { background: #0d1117; border: 1px solid #30363d; border-radius: 4px; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; margin-bottom: 2px; }

        .tier-header { padding: 12px; text-align: center; font-weight: 900; font-style: italic; border-radius: 8px; margin-bottom: 10px; text-transform: uppercase; font-size: 0.8rem; }
        .th-1 { background: rgba(248, 81, 73, 0.1); color: #ffca28; border-bottom: 2px solid #ffca28; }
        .th-2 { background: #21262d; color: #eceff1; border-bottom: 2px solid #8b949e; }
        .th-3 { background: rgba(141, 93, 46, 0.1); color: #8d5d2e; border-bottom: 2px solid #8d5d2e; }

        #modal-overlay { background: rgba(0, 0, 0, 0.95); backdrop-filter: blur(15px); display: none; position: fixed; inset: 0; z-index: 100; align-items: center; justify-content: center; padding: 20px; }
        .credit { position: fixed; bottom: 20px; right: 20px; color: #484f58; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; pointer-events: none; z-index: 50; }

        .HT1, .RHT1 { color: #b8860b; font-weight: 900; } .LT1, .RLT1 { color: #ffeb3b; }
        .HT2, .RHT2 { color: #78909c; font-weight: 900; } .LT2, .RLT2 { color: #f5f5f5; }
        .HT3, .RHT3 { color: #5d4037; font-weight: 900; } .LT3, .RLT3 { color: #a1887f; }
        .HT4, .RHT4, .HT5, .RHT5 { color: #30363d; font-weight: 900; } .LT4, .RLT4, .LT5, .RLT5 { color: #8b949e; }
    </style>
</head>
<body class="p-4 md:p-8 pb-20">
    <div class="max-w-[1200px] mx-auto">
        <div class="header-container">
            <h1 class="text-4xl font-black italic text-white uppercase tracking-tighter">DARK<span class="text-red-500">TIERS</span></h1>
            <div class="flex flex-col md:flex-row items-center gap-4">
                <input type="text" id="search" placeholder="FIND PLAYER..." class="bg-[#161b22] border border-[#30363d] rounded-lg px-5 py-2 text-xs font-bold text-white uppercase tracking-widest focus:border-red-500 outline-none">
                <a href="https://discord.gg/6HvjAWacwN" target="_blank" class="discord-btn">DISCORD</a>
            </div>
        </div>

        <div class="mode-nav">
            <div class="nav-btn active" onclick="updateView('Overall', this)">Overall</div>
            <div class="nav-btn" onclick="updateView('Mace Tier', this)"><img src="icons/mace.png" class="w-3"> Mace</div>
            <div class="nav-btn" onclick="updateView('SMP Tier', this)"><img src="icons/smp.png" class="w-3"> SMP</div>
            <div class="nav-btn" onclick="updateView('Ground Mace Tier', this)"><img src="icons/ground.png" class="w-3"> Ground</div>
            <div class="nav-btn" onclick="updateView('Cart Tier', this)"><img src="icons/cart.png" class="w-3"> Cart</div>
        </div>

        <div id="main-content"></div>
    </div>

    <div class="credit">made by Tr2hardx</div>

    <div id="modal-overlay" onclick="this.style.display='none'">
        <div class="bg-[#161b22] border-2 border-[#30363d] rounded-3xl p-8 max-w-sm w-full relative" onclick="event.stopPropagation()">
            <div id="modal-body"></div>
        </div>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQcGjwmzNmdB77JbY_9igGC83HVYK5lSx_N9Xs5ii0hBARWu8vB8V7J3b5dyBEXk59GAvoB3gxeaGqy/pub?output=csv';
        const basePoints = { 'HT1': 60, 'LT1': 45, 'HT2': 30, 'LT2': 20, 'HT3': 10, 'LT3': 6, 'HT4': 4, 'LT4': 3, 'HT5': 2, 'LT5': 1 };
        const modeKeys = ['Mace Tier', 'SMP Tier', 'Ground Mace Tier', 'Cart Tier'];
        const modeLabels = ['Mace', 'SMP', 'Ground', 'Cart'];
        const iconPaths = ['icons/mace.png', 'icons/smp.png', 'icons/ground.png', 'icons/cart.png'];
        
        const CLASSIC_STEVE_UUID = 'c5ad1893-57f0-4a4c-93dc-0e8bef1acce4';
        const FALLBACK_HEAD = `https://minotar.net/helm/${CLASSIC_STEVE_UUID}/40`;
        const FALLBACK_FULL = `https://visage.surgeplay.com/full/350/${CLASSIC_STEVE_UUID}`;

        const img1 = new Image(); img1.src = FALLBACK_HEAD;
        const img2 = new Image(); img2.src = FALLBACK_FULL;

        let playersData = [];
        let sortedOverall = [];
        let currentMode = 'Overall';

        async function init() {
            Papa.parse(CSV_URL, {
                download: true, header: true, skipEmptyLines: true,
                complete: function(r) {
                    playersData = r.data.filter(p => p.IGN).map(p => {
                        let score = 0;
                        modeKeys.forEach(m => {
                            if (p[m]) {
                                const clean = p[m].trim().toUpperCase().replace('R', '');
                                score += basePoints[clean] || 0;
                            }
                        });
                        return { ...p, totalPoints: score };
                    });
                    sortedOverall = [...playersData].sort((a,b) => b.totalPoints - a.totalPoints);
                    updateView('Overall');
                }
            });
        }

        function getCustomModalStyle(p) {
            const baseClass = "modal-ign ";
            const globalRank = sortedOverall.findIndex(player => player.IGN === p.IGN) + 1;
            
            if (globalRank === 1) return `style="color: #FFD700; text-shadow: 0 0 15px rgba(255, 215, 0, 0.4);" class="${baseClass}"`;
            if (globalRank === 2) return `style="color: #C0C0C0; text-shadow: 0 0 15px rgba(192, 192, 192, 0.4);" class="${baseClass}"`;
            if (globalRank === 3) return `style="color: #CD7F32; text-shadow: 0 0 15px rgba(205, 127, 50, 0.4);" class="${baseClass}"`;

            if (!p.Color || p.Color.trim() === "") return `class="${baseClass} text-white"`;
            const colorValue = p.Color.trim();
            if (colorValue.includes('gradient')) {
                return `style="background: ${colorValue}; -webkit-background-clip: text; -webkit-text-fill-color: transparent;" class="${baseClass}"`;
            } else {
                return `style="color: ${colorValue};" class="${baseClass}"`;
            }
        }

        function updateView(mode, el) {
            currentMode = mode;
            if(el) {
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                el.classList.add('active');
            }
            const term = document.getElementById('search').value.toLowerCase();
            const filtered = playersData.filter(p => p.IGN.toLowerCase().includes(term));
            const content = document.getElementById('main-content');
            content.innerHTML = '';

            if (mode === 'Overall') {
                filtered.sort((a,b) => b.totalPoints - a.totalPoints).forEach((p, i) => {
                    const card = document.createElement('div');
                    card.className = 'overall-card';
                    card.onclick = () => openProfile(p);
                    
                    let rankStyle = 'class="text-white"';
                    if (term === "") {
                        if (i === 0) rankStyle = 'style="color: #FFD700"';
                        else if (i === 1) rankStyle = 'style="color: #C0C0C0"';
                        else if (i === 2) rankStyle = 'style="color: #CD7F32"';
                    }

                    card.innerHTML = `
                        <div class="text-xl font-black italic text-gray-800 w-8 mr-4">${i+1}</div>
                        <img src="https://minotar.net/helm/${p.IGN}/40" class="rounded-lg mr-4" onerror="this.src='${FALLBACK_HEAD}'">
                        <div class="flex flex-col max-w-[150px]"> <span ${rankStyle} class="font-black text-sm uppercase tracking-tight truncate">${p.IGN}</span>
                            <span class="text-[10px] font-black text-red-500 uppercase tracking-widest">${p.totalPoints} PTS</span>
                        </div>
                        <div class="tier-badge-group">
                            ${modeKeys.map((key, idx) => p[key] ? `
                                <div class="badge-item">
                                    <div class="badge-icon-box"><img src="${iconPaths[idx]}" class="w-3"></div>
                                    <span class="text-[8px] font-black ${p[key].toUpperCase()}">${p[key]}</span>
                                </div>
                            ` : '').join('')}
                        </div>
                    `;
                    content.appendChild(card);
                });
            } else {
                const grid = document.createElement('div');
                grid.className = 'grid grid-cols-1 md:grid-cols-5 gap-4';
                for (let i = 1; i <= 5; i++) {
                    const col = document.createElement('div');
                    col.innerHTML = `<div class="tier-header th-${i}">TIER ${i}</div>`;
                    
                    const tierPlayers = filtered.filter(p => {
                        const val = (p[mode] || '').toUpperCase();
                        return val.includes(i.toString()) && !val.includes('R');
                    }).sort((a, b) => {
                        const valA = a[mode].toUpperCase();
                        const valB = b[mode].toUpperCase();
                        if (valA.startsWith('HT') && valB.startsWith('LT')) return -1;
                        if (valA.startsWith('LT') && valB.startsWith('HT')) return 1;
                        return a.IGN.localeCompare(b.IGN);
                    });

                    tierPlayers.forEach(p => {
                        const div = document.createElement('div');
                        div.className = `flex items-center justify-between p-3 mb-2 cursor-pointer bg-[#161b22] border border-[#30363d] rounded-lg hover:border-red-500`;
                        div.onclick = () => openProfile(p);
                        div.innerHTML = `
                            <div class="flex items-center gap-3 overflow-hidden">
                                <img src="https://minotar.net/helm/${p.IGN}/24" class="rounded-sm" onerror="this.src='${FALLBACK_HEAD}'">
                                <span class="text-white font-bold text-xs uppercase truncate">${p.IGN}</span>
                            </div>
                            <span class="text-[9px] font-black italic ${p[mode].toUpperCase()}">${p[mode]}</span>
                        `;
                        col.appendChild(div);
                    });
                    grid.appendChild(col);
                }
                content.appendChild(grid);
            }
        }

        function openProfile(p) {
            const body = document.getElementById('modal-body');
            const renderUrl = `https://visage.surgeplay.com/full/350/${p.IGN}`;
            const globalRank = sortedOverall.findIndex(player => player.IGN === p.IGN) + 1;

            body.innerHTML = `
                <div class="flex justify-center mb-6">
                    <img src="${renderUrl}" class="h-64 drop-shadow-[0_20px_40px_rgba(0,0,0,0.6)] hover:scale-105 transition-transform" onerror="this.onerror=null; this.src='${FALLBACK_FULL}';">
                </div>
                <h2 ${getCustomModalStyle(p)}>${p.IGN}</h2>
                <div class="grid grid-cols-2 gap-3 mt-6">
                    ${modeKeys.map((k, i) => `
                        <div class="tier-pill">
                            <p class="text-[8px] text-gray-500 font-black mb-1 uppercase tracking-widest">${modeLabels[i]}</p>
                            <p class="text-base font-black italic ${p[k] || ''}">${p[k] || '-'}</p>
                        </div>
                    `).join('')}
                </div>
                <div class="mt-6 pt-6 border-t border-[#30363d] space-y-4">
                    <div class="flex justify-between items-center">
                        <span class="text-gray-500 text-[10px] font-black uppercase tracking-widest">Global Score</span>
                        <span class="text-white text-2xl font-black italic">${p.totalPoints}</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-gray-500 text-[10px] font-black uppercase tracking-widest">Global Ranking</span>
                        <span class="text-red-500 text-2xl font-black italic">#${globalRank}</span>
                    </div>
                </div>
            `;
            document.getElementById('modal-overlay').style.display = 'flex';
        }

        document.getElementById('search').addEventListener('input', () => updateView(currentMode));
        init();
    </script>
</body>
</html>
