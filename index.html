<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark SMP | Official Rankings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap');
        
        body { background-color: #0d1117; color: #c9d1d9; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }

        /* HEADER & SEARCH */
        .header-container { display: flex; flex-direction: column; align-items: center; gap: 1rem; margin-bottom: 2rem; padding: 1rem; }
        @media (min-width: 768px) { .header-container { flex-direction: row; justify-content: space-between; } }

        /* BUTTON MENU - MOBILE OPTIMIZED */
        .mode-nav { 
            display: flex; gap: 10px; margin-bottom: 30px; overflow-x: auto; 
            padding: 10px 5px; scrollbar-width: none; -ms-overflow-style: none;
        }
        .mode-nav::-webkit-scrollbar { display: none; }
        
        .nav-btn {
            background: #161b22; border: 1px solid #30363d; padding: 8px 18px; border-radius: 10px;
            font-size: 11px; font-weight: 800; text-transform: uppercase; color: #8b949e; 
            cursor: pointer; display: flex; align-items: center; gap: 8px; white-space: nowrap; transition: 0.2s;
        }
        .nav-btn.active { background: #21262d; color: white; border: 1px solid #f85149; }
        .nav-btn img { width: 16px; height: 16px; object-fit: contain; }

        /* HT vs LT STYLING */
        .row-ht { background: #11141a; border: 1px solid #442d2d; border-radius: 6px; } 
        .row-lt { background: #2d333b; border: 1px solid #444c56; border-radius: 6px; }

        /* OVERALL CARD STYLE */
        .overall-card { 
            background: rgba(22, 27, 34, 0.6); border: 1px solid #30363d; border-radius: 12px;
            padding: 12px 16px; display: flex; align-items: center; margin-bottom: 10px; cursor: pointer;
        }

        /* OVERALL BADGE GROUPING */
        .tier-badge-group { display: flex; gap: 8px; margin-left: auto; overflow-x: auto; }
        .badge-item { display: flex; flex-direction: column; align-items: center; min-width: 28px; }
        .badge-icon-box { background: #0d1117; border: 1px solid #30363d; border-radius: 4px; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; margin-bottom: 2px; }

        /* TIER HEADERS */
        .tier-header { 
            padding: 10px; text-align: center; font-weight: 900; font-style: italic; 
            border-radius: 8px; margin-bottom: 10px; text-transform: uppercase; font-size: 0.75rem;
            border-bottom: 3px solid transparent;
        }
        .th-1 { background: rgba(248, 81, 73, 0.1); color: #ffca28; border-bottom-color: #f85149; }
        .th-2 { background: #21262d; color: #eceff1; border-bottom-color: #8b949e; }
        .th-3 { background: rgba(141, 93, 46, 0.1); color: #8d5d2e; border-bottom-color: #8d5d2e; }
        .th-4, .th-5 { background: #161b22; color: #8b949e; }

        /* TIER TEXT COLORS */
        .HT1, .LT1, .RHT1, .RLT1 { color: #ffca28; }
        .HT2, .LT2, .RHT2, .RLT2 { color: #eceff1; }
        .HT3, .LT3, .RHT3, .RLT3 { color: #8d5d2e; }

        /* MODAL & GLOBAL SCORE */
        #modal-overlay { background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(10px); display: none; position: fixed; inset: 0; z-index: 100; align-items: center; justify-content: center; padding: 20px; }
        .global-score-box {
            margin-top: 20px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(248, 81, 73, 0.1); border: 1px solid rgba(248, 81, 73, 0.4);
            padding: 16px 20px; border-radius: 12px;
        }

        /* RESPONSIVE GRID */
        .tier-grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        @media (min-width: 1024px) { .tier-grid { grid-template-columns: repeat(5, 1fr); } }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-[1200px] mx-auto">
        <div class="header-container">
            <h1 class="text-3xl font-black italic text-white uppercase tracking-tighter">DARK<span class="text-red-500">TIERS</span></h1>
            <input type="text" id="search" placeholder="Search player..." class="bg-[#0d1117] border border-[#30363d] rounded-lg px-5 py-2 text-sm text-white w-full md:w-64 focus:border-red-500 outline-none">
        </div>

        <div class="mode-nav no-scrollbar">
            <div class="nav-btn active" onclick="updateView('Overall', this)">Overall</div>
            <div class="nav-btn" onclick="updateView('Mace Tier', this)"><img src="icons/mace.png"> Mace</div>
            <div class="nav-btn" onclick="updateView('SMP Tier', this)"><img src="icons/smp.png"> SMP</div>
            <div class="nav-btn" onclick="updateView('Ground Mace Tier', this)"><img src="icons/ground.png"> Ground</div>
            <div class="nav-btn" onclick="updateView('Cart Tier', this)"><img src="icons/cart.png"> Cart</div>
        </div>

        <div id="main-content"></div>
    </div>

    <div id="modal-overlay" onclick="this.style.display='none'">
        <div class="bg-[#161b22] border border-[#30363d] rounded-2xl p-8 max-w-sm w-full relative" onclick="event.stopPropagation()">
            <div id="modal-body"></div>
        </div>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQcGjwmzNmdB77JbY_9igGC83HVYK5lSx_N9Xs5ii0hBARWu8vB8V7J3b5dyBEXk59GAvoB3gxeaGqy/pub?output=csv';
        const basePoints = { 'HT1': 60, 'LT1': 45, 'HT2': 30, 'LT2': 20, 'HT3': 10, 'LT3': 6, 'HT4': 4, 'LT4': 3, 'HT5': 2, 'LT5': 1 };
        const modeKeys = ['Mace Tier', 'SMP Tier', 'Ground Mace Tier', 'Cart Tier'];
        const modeLabels = ['Mace', 'SMP', 'Ground', 'Cart'];
        const iconPaths = ['icons/mace.png', 'icons/smp.png', 'icons/ground.png', 'icons/cart.png'];
        
        let playersData = [];
        let currentMode = 'Overall';

        async function init() {
            Papa.parse(CSV_URL, {
                download: true, header: true, skipEmptyLines: true,
                complete: function(r) {
                    playersData = r.data.filter(p => p.IGN).map(p => {
                        let score = 0;
                        modeKeys.forEach(m => {
                            if (p[m]) {
                                const clean = p[m].trim().toUpperCase().replace('R', '');
                                score += basePoints[clean] || 0;
                            }
                        });
                        return { ...p, totalPoints: score };
                    });
                    updateView('Overall');
                }
            });
        }

        function updateView(mode, el) {
            currentMode = mode;
            if(el) {
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                el.classList.add('active');
            }
            const term = document.getElementById('search').value.toLowerCase();
            const filtered = playersData.filter(p => p.IGN.toLowerCase().includes(term));
            const content = document.getElementById('main-content');
            content.innerHTML = '';

            if (mode === 'Overall') {
                filtered.sort((a,b) => b.totalPoints - a.totalPoints).forEach((p, i) => {
                    const card = document.createElement('div');
                    card.className = 'overall-card';
                    card.onclick = () => openProfile(p);
                    card.innerHTML = `
                        <div class="text-lg font-black italic text-gray-700 w-6 mr-3">${i+1}</div>
                        <img src="https://minotar.net/helm/${p.IGN}/36" class="rounded mr-4">
                        <div class="flex flex-col">
                            <span class="text-white font-black text-sm">${p.IGN}</span>
                            <span class="text-[9px] font-bold text-red-500 uppercase">${p.totalPoints} PTS</span>
                        </div>
                        <div class="tier-badge-group">
                            ${modeKeys.map((key, idx) => p[key] ? `
                                <div class="badge-item">
                                    <div class="badge-icon-box"><img src="${iconPaths[idx]}" class="w-3"></div>
                                    <span class="text-[7px] font-black ${p[key].toUpperCase()}">${p[key]}</span>
                                </div>
                            ` : '').join('')}
                        </div>
                    `;
                    content.appendChild(card);
                });
            } else {
                const grid = document.createElement('div');
                grid.className = 'tier-grid';
                for (let i = 1; i <= 5; i++) {
                    const col = document.createElement('div');
                    col.innerHTML = `<div class="tier-header th-${i}">Tier ${i}</div>`;
                    
                    const tierList = filtered.filter(p => {
                        const t = (p[mode]||'').toUpperCase();
                        return t.includes(i.toString()) && !t.includes('R');
                    }).sort((a,b) => (a[mode].toUpperCase().includes('HT') ? -1 : 1));

                    tierList.forEach(p => {
                        const div = document.createElement('div');
                        const isHT = (p[mode]||'').toUpperCase().includes('HT');
                        div.className = `flex items-center gap-3 p-3 mb-2 cursor-pointer ${isHT ? 'row-ht' : 'row-lt'}`;
                        div.onclick = () => openProfile(p);
                        div.innerHTML = `<img src="https://minotar.net/helm/${p.IGN}/24" class="rounded-sm"><span class="text-xs font-bold">${p.IGN}</span>`;
                        col.appendChild(div);
                    });
                    grid.appendChild(col);
                }
                content.appendChild(grid);
            }
        }

        function openProfile(p) {
            const body = document.getElementById('modal-body');
            body.innerHTML = `
                <img src="https://minotar.net/armor/body/${p.IGN}/120" class="mx-auto mb-6">
                <h2 class="text-3xl font-black text-white text-center italic uppercase mb-1">${p.IGN}</h2>
                <div class="grid grid-cols-2 gap-3 mt-4">
                    ${modeKeys.map((k, i) => `
                        <div class="bg-[#0d1117] p-3 rounded-xl border border-[#30363d] text-center">
                            <p class="text-[8px] text-gray-500 font-bold mb-1 uppercase">${modeLabels[i]}</p>
                            <p class="text-base font-black ${p[k] || ''}">${p[k] || '-'}</p>
                        </div>
                    `).join('')}
                </div>
                <div class="global-score-box">
                    <span class="text-[#f85149] text-[11px] font-black uppercase">Global Score</span>
                    <span class="text-white text-2xl font-black">${p.totalPoints}</span>
                </div>
            `;
            document.getElementById('modal-overlay').style.display = 'flex';
        }

        document.getElementById('search').addEventListener('input', () => updateView(currentMode));
        init();
    </script>
</body>
</html>
