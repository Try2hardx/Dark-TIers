<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dark SMP | Official Rankings</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Barlow+Condensed:ital,wght@0,400;0,700;0,900;1,900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red: #e05555;
      --red-dim: rgba(224,85,85,0.15);
      --red-glow: rgba(224,85,85,0.35);
      --bg: #080b10;
      --bg2: #0e1318;
      --bg3: #141a22;
      --border: #1e2530;
      --border-h: #2c3545;
      --text: #c9d1d9;
      --muted: #5c6672;
      --gold: #f5c842;
      --silver: #c0ccd8;
      --bronze: #cd7f3a;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Barlow Condensed', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0; left: 50%;
      transform: translateX(-50%);
      width: 900px; height: 500px;
      background: radial-gradient(ellipse at 50% 0%, rgba(224,85,85,0.06) 0%, transparent 65%);
      pointer-events: none; z-index: 0;
    }

    /* Scanline texture */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
      pointer-events: none;
      z-index: 0;
    }

    .wrap { max-width: 1200px; margin: 0 auto; padding: 2rem 1.5rem 6rem; position: relative; z-index: 1; }

    /* ─── HEADER ─── */
    .site-header {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 1rem; margin-bottom: 2.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900; font-size: 2.2rem;
      letter-spacing: -1px; line-height: 1;
      text-transform: uppercase;
    }
    .logo span { color: var(--red); }

    .logo-sub {
      font-size: 0.62rem; letter-spacing: 4px; color: var(--muted);
      text-transform: uppercase; margin-top: 2px;
      font-family: 'Orbitron', sans-serif;
    }

    .header-actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

    .pill-btn {
      background: var(--bg2); border: 1px solid var(--border);
      padding: 7px 14px; border-radius: 8px;
      font-family: 'Orbitron', sans-serif;
      font-size: 9px; font-weight: 700; letter-spacing: 1.5px;
      text-transform: uppercase; color: var(--muted);
      cursor: pointer; display: flex; align-items: center; gap: 7px;
      transition: all 0.2s; text-decoration: none;
    }
    .pill-btn:hover { border-color: var(--red); color: var(--red); transform: translateY(-2px); box-shadow: 0 4px 16px var(--red-dim); }

    #search {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 8px; padding: 7px 16px;
      font-family: 'Orbitron', sans-serif;
      font-size: 9px; letter-spacing: 2px; color: #fff;
      text-transform: uppercase; outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      width: 180px;
    }
    #search::placeholder { color: var(--muted); }
    #search:focus { border-color: var(--red); box-shadow: 0 0 0 2px var(--red-dim); }

    /* ─── MODE NAV ─── */
    .mode-nav {
      display: flex; gap: 8px; margin-bottom: 2rem;
      overflow-x: auto; padding: 4px 2px 12px;
      scrollbar-width: none;
    }
    .mode-nav::-webkit-scrollbar { display: none; }

    .nav-btn {
      background: var(--bg2); border: 1px solid var(--border);
      padding: 8px 18px; border-radius: 8px;
      font-family: 'Orbitron', sans-serif;
      font-size: 9px; font-weight: 700; letter-spacing: 1.5px;
      text-transform: uppercase; color: var(--muted);
      cursor: pointer; white-space: nowrap;
      display: flex; align-items: center; gap: 8px;
      transition: all 0.2s;
    }
    .nav-btn img { width: 14px; height: 14px; image-rendering: pixelated; }
    .nav-btn:hover { border-color: var(--border-h); color: var(--text); transform: translateY(-2px); }
    .nav-btn.active { background: var(--bg3); border-color: var(--red); color: var(--red); box-shadow: 0 0 16px var(--red-dim); }

    /* ─── OVERALL CARDS ─── */
    .player-card {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 12px; padding: 14px 18px;
      display: flex; align-items: center; gap: 14px;
      margin-bottom: 8px; cursor: pointer;
      transition: all 0.3s cubic-bezier(0.175,0.885,0.32,1.275);
      transform-style: preserve-3d;
      position: relative; overflow: hidden;
    }
    .player-card::before {
      content: '';
      position: absolute; left: 0; top: 0; bottom: 0;
      width: 3px; border-radius: 3px 0 0 3px;
      background: var(--border);
      transition: background 0.2s;
    }
    .player-card:hover::before { background: var(--red); }
    .player-card:hover {
      border-color: var(--border-h);
      background: var(--bg3);
      transform: translateX(4px) translateZ(10px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    }

    .card-rank {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.1rem; font-weight: 900;
      color: var(--muted); width: 32px; text-align: center; shrink: 0;
      flex-shrink: 0;
    }
    .rank-gold { color: var(--gold) !important; }
    .rank-silver { color: var(--silver) !important; }
    .rank-bronze { color: var(--bronze) !important; }

    .player-head {
      width: 44px; height: 44px; border-radius: 8px;
      image-rendering: pixelated; flex-shrink: 0;
      border: 1px solid var(--border);
    }

    .card-info { flex: 1; min-width: 0; }
    .card-ign {
      font-weight: 900; font-style: italic;
      font-size: 1.1rem; text-transform: uppercase;
      letter-spacing: 0.5px; color: #fff;
      line-height: 1; truncate: true;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .card-sub {
      display: flex; align-items: center; gap: 10px; margin-top: 3px;
    }
    .card-title { font-size: 0.7rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
    .card-pts { font-size: 0.7rem; font-weight: 700; color: var(--muted); letter-spacing: 1px; }

    /* Region badge */
    .region-badge {
      font-size: 0.6rem; font-weight: 900; letter-spacing: 1.5px;
      text-transform: uppercase; color: var(--muted);
      background: var(--bg); border: 1px solid var(--border);
      padding: 2px 7px; border-radius: 4px;
    }

    .card-tiers { display: flex; gap: 6px; flex-shrink: 0; margin-left: auto; }
    .tier-badge {
      display: flex; flex-direction: column; align-items: center;
      gap: 3px; min-width: 32px;
    }
    .tier-icon-box {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 5px; width: 22px; height: 22px;
      display: flex; align-items: center; justify-content: center;
    }
    .tier-icon-box img { width: 12px; height: 12px; image-rendering: pixelated; }
    .tier-badge-val { font-size: 0.6rem; font-weight: 900; }

    /* ─── TIER GRID ─── */
    .tier-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; }
    @media (max-width: 900px) { .tier-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 600px) { .tier-grid { grid-template-columns: repeat(2, 1fr); } }

    .tier-col-header {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.65rem; font-weight: 900; letter-spacing: 2px;
      text-transform: uppercase; text-align: center;
      padding: 10px; border-radius: 8px; margin-bottom: 10px;
    }
    .th1 { color: var(--gold); border-bottom: 2px solid var(--gold); background: rgba(245,200,66,0.05); }
    .th2 { color: var(--silver); border-bottom: 2px solid var(--silver); background: rgba(192,204,216,0.04); }
    .th3 { color: var(--bronze); border-bottom: 2px solid var(--bronze); background: rgba(205,127,58,0.05); }
    .th4, .th5 { color: var(--muted); border-bottom: 2px solid var(--border); background: rgba(255,255,255,0.02); }

    .mini-card {
      display: flex; align-items: center; gap: 8px;
      padding: 9px 12px; margin-bottom: 6px; border-radius: 8px;
      background: var(--bg2); border: 1px solid var(--border);
      cursor: pointer; transition: all 0.2s;
    }
    .mini-card:hover { border-color: var(--red); background: var(--bg3); transform: translateX(3px); }
    .mini-head { width: 24px; height: 24px; border-radius: 4px; image-rendering: pixelated; }
    .mini-ign { font-weight: 700; font-size: 0.8rem; text-transform: uppercase; color: #fff; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .mini-tier { font-size: 0.65rem; font-weight: 900; font-style: italic; margin-left: auto; flex-shrink: 0; }

    /* ─── MODAL ─── */
    #modal-overlay {
      display: none; position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.88); backdrop-filter: blur(12px);
      align-items: center; justify-content: center;
      padding: 20px; overflow-y: auto;
    }
    #modal-overlay.open { display: flex; }

    .modal-box {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 20px; width: 100%; max-width: 360px;
      position: relative; overflow: hidden;
      box-shadow: 0 40px 80px rgba(0,0,0,0.6), 0 0 40px var(--red-dim);
    }
    .modal-box::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, transparent, var(--red), transparent);
    }

    .modal-inner { padding: 28px 24px 24px; }

    .modal-ign {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900; font-style: italic;
      text-transform: uppercase; font-size: 2rem;
      text-align: center; letter-spacing: -1px;
      word-break: break-word; line-height: 1;
      color: #fff;
    }
    .modal-title-row {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      margin-top: 6px; margin-bottom: 20px;
    }
    .modal-title-text { font-size: 0.75rem; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; }
    .modal-region-pill {
      font-size: 0.62rem; font-weight: 900; letter-spacing: 1.5px;
      text-transform: uppercase; background: var(--bg);
      border: 1px solid var(--border); color: var(--muted);
      padding: 2px 8px; border-radius: 4px;
    }

    .modal-render { display: flex; justify-content: center; margin-bottom: 20px; }
    .modal-render img { height: 180px; image-rendering: pixelated; filter: drop-shadow(0 20px 30px rgba(0,0,0,0.6)); transition: transform 0.3s; }
    .modal-render img:hover { transform: scale(1.05); }

    .mode-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 20px; }
    .mode-pill {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px; text-align: center;
      transition: border-color 0.2s;
    }
    .mode-pill:hover { border-color: var(--border-h); }
    .mode-label { font-size: 0.6rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
    .mode-val { font-size: 1.1rem; font-weight: 900; font-style: italic; }

    .modal-stats {
      border-top: 1px solid var(--border); padding-top: 16px;
      display: flex; flex-direction: column; gap: 10px;
    }
    .stat-row { display: flex; align-items: center; justify-content: space-between; }
    .stat-label { font-size: 0.65rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); }
    .stat-val { font-family: 'Orbitron', sans-serif; font-size: 1.4rem; font-weight: 900; color: #fff; }
    .stat-region { font-size: 0.9rem; font-weight: 700; color: #fff; letter-spacing: 2px; text-transform: uppercase; }

    /* ─── CLOSE BUTTON ─── */
    .modal-close {
      position: absolute; top: 14px; right: 14px;
      width: 30px; height: 30px; border-radius: 50%;
      background: var(--bg3); border: 1px solid var(--border);
      color: var(--muted); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700; transition: all 0.2s;
      z-index: 10;
    }
    .modal-close:hover { border-color: var(--red); color: var(--red); }

    /* ─── POINT / RANKS MODAL ─── */
    .info-modal-box {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 20px; width: 100%; max-width: 340px;
      padding: 28px 24px; position: relative;
      box-shadow: 0 40px 80px rgba(0,0,0,0.6), 0 0 40px var(--red-dim);
    }
    .info-modal-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 1rem; font-weight: 900; letter-spacing: 1px;
      text-transform: uppercase; color: var(--red);
      text-align: center; margin-bottom: 4px;
    }
    .info-modal-sub { font-size: 0.65rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); text-align: center; margin-bottom: 20px; }

    .rank-row {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 16px; margin-bottom: 8px;
      transition: border-color 0.2s;
    }
    .rank-row:hover { border-color: var(--border-h); }
    .rank-name { font-weight: 900; font-size: 1rem; text-transform: uppercase; letter-spacing: 1px; }
    .rank-pts { font-size: 0.65rem; font-weight: 700; color: var(--muted); }

    .pts-row {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 16px; margin-bottom: 8px;
    }
    .pts-tier { font-weight: 900; font-style: italic; font-size: 0.9rem; }
    .pts-val { font-size: 0.9rem; font-weight: 700; color: #fff; }

    /* ─── TITLE CLASSES ─── */
    .title-paragon   { background: linear-gradient(90deg,#ff00ff,#ff80ff,#ff00ff); background-size:200% auto; animation:shimmer 3s linear infinite; -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .title-overlord  { background: linear-gradient(90deg,#ff4d4d,#ff9999,#ff4d4d); background-size:200% auto; animation:shimmer 3s linear infinite; -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .title-conqueror { background: linear-gradient(90deg,#ffa500,#ffd080,#ffa500); background-size:200% auto; animation:shimmer 3s linear infinite; -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .title-vanguard  { color: #5dade2; }
    .title-slayer    { color: #58d68d; }
    .title-duelist   { color: #f4d03f; }
    .title-initiate  { color: #abb2b9; }
    .title-challenger{ color: #566573; }

    @keyframes shimmer { 0%{background-position:-200% center} 100%{background-position:200% center} }

    @keyframes flowText {
      0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%}
    }
    .animate-flow { background-size:300% 300% !important; animation: flowText 6s ease-in-out infinite !important; display:block; }
    .flow-gold   { background: linear-gradient(90deg,#bf953f,#fcf6ba,#b38728,#fcf6ba,#bf953f); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .flow-silver { background: linear-gradient(90deg,#757575,#e0e0e0,#8d8d8d,#e0e0e0,#757575); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .flow-bronze { background: linear-gradient(90deg,#804a00,#cd7f32,#b08d57,#cd7f32,#804a00); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }

    /* ─── TIER COLOR CLASSES ─── */
    .HT1, .RHT1 { color:#b8860b; } .LT1, .RLT1 { color:#ffeb3b; }
    .HT2, .RHT2 { color:#78909c; } .LT2, .RLT2 { color:#f5f5f5; }
    .HT3, .RHT3 { color:#5d4037; } .LT3, .RLT3 { color:#a1887f; }
    .HT4, .RHT4, .HT5, .RHT5 { color:#30363d; } .LT4, .RLT4, .LT5, .RLT5 { color:#8b949e; }

    /* scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--red); }

    .credit { position: fixed; bottom: 16px; right: 20px; color: var(--muted); font-size: 10px; font-weight: 700; font-family:'Orbitron',sans-serif; letter-spacing:2px; text-transform:uppercase; pointer-events:none; z-index:50; opacity:0.5; }

    @keyframes purpleBlueGlow {
      0%{border-color:#a855f7; box-shadow:0 0 14px rgba(168,85,247,0.4)}
      50%{border-color:#3b82f6; box-shadow:0 0 20px rgba(59,130,246,0.5)}
      100%{border-color:#a855f7; box-shadow:0 0 14px rgba(168,85,247,0.4)}
    }

    .pts-scroll { max-height: 380px; overflow-y: auto; padding-right: 4px; }

    @media (max-width: 640px) {
      .logo { font-size: 1.6rem; }
      .card-tiers { display: none; }
      .mode-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <div class="wrap">

    <!-- HEADER -->
    <header class="site-header">
      <div>
        <div class="logo">DARK<span>TIERS</span></div>
        <div class="logo-sub">Official Rankings</div>
      </div>
      <div class="header-actions">
        <button class="pill-btn" onclick="showRanksModal()">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
          Ranks
        </button>
        <button class="pill-btn" onclick="showPointSystem()">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          Points
        </button>
        <input type="text" id="search" placeholder="Find Player…">
        <a href="https://discord.gg/6HvjAWacwN" target="_blank" class="pill-btn">
          <svg width="11" height="11" viewBox="0 0 127.14 96.36" fill="currentColor"><path d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.37,72.37,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.79,32.65-1.71,56.6.54,80.21h0A105.73,105.73,0,0,0,32.71,96.36,77.7,77.7,0,0,0,39.6,85.25a68.42,68.42,0,0,1-10.85-5.18c.91-.66,1.8-1.34,2.66-2a75.57,75.57,0,0,0,64.32,0c.87.71,1.76,1.39,2.66,2a68.68,68.68,0,0,1-10.87,5.19,77,77,0,0,0,6.89,11.1A105.25,105.25,0,0,0,126.6,80.22h0C129.24,52.84,122.09,29.11,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53s5-12.74,11.43-12.74S54,46,53.89,53,48.84,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.25,60,73.25,53s5-12.74,11.44-12.74S96.23,46,96.12,53,91.08,65.69,84.69,65.69Z"/></svg>
          Discord
        </a>
      </div>
    </header>

    <!-- MODE NAV -->
    <nav class="mode-nav">
      <div class="nav-btn active" onclick="updateView('Overall',this)">Overall</div>
      <div class="nav-btn" onclick="updateView('Mace Tier',this)"><img src="icons/mace.png"> Mace</div>
      <div class="nav-btn" onclick="updateView('SMP Tier',this)"><img src="icons/smp.png"> SMP</div>
      <div class="nav-btn" onclick="updateView('Ground Mace Tier',this)"><img src="icons/ground.png"> Ground</div>
      <div class="nav-btn" onclick="updateView('Cart Tier',this)"><img src="icons/cart.png"> Cart</div>
      <div class="nav-btn" onclick="updateView('UHC Tier',this)"><img src="icons/uhc.png"> UHC</div>
    </nav>

    <div id="main-content"></div>
  </div>

  <div class="credit">made by Tr2hardx</div>

  <!-- PROFILE MODAL -->
  <div id="modal-overlay" onclick="closeModal()">
    <div class="modal-box" onclick="event.stopPropagation()">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div class="modal-inner" id="modal-body"></div>
    </div>
  </div>

  <script>
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQcGjwmzNmdB77JbY_9igGC83HVYK5lSx_N9Xs5ii0hBARWu8vB8V7J3b5dyBEXk59GAvoB3gxeaGqy/pub?output=csv';
    const basePoints = { HT1:60, LT1:45, HT2:30, LT2:20, HT3:10, LT3:6, HT4:4, LT4:3, HT5:2, LT5:1 };
    const modeKeys   = ['Mace Tier','SMP Tier','Ground Mace Tier','Cart Tier','UHC Tier'];
    const modeLabels = ['Mace','SMP','Ground','Cart','UHC'];
    const iconPaths  = ['icons/mace.png','icons/smp.png','icons/ground.png','icons/cart.png','icons/uhc.png'];
    const FALLBACK_HEAD = 'https://minotar.net/helm/c5ad1893-57f0-4a4c-93dc-0e8bef1acce4/44';
    const FALLBACK_FULL = 'https://visage.surgeplay.com/full/350/c5ad1893-57f0-4a4c-93dc-0e8bef1acce4';

    const titles = [
      {name:'Paragon',   min:400, cls:'title-paragon'},
      {name:'Overlord',  min:300, cls:'title-overlord'},
      {name:'Conqueror', min:180, cls:'title-conqueror'},
      {name:'Vanguard',  min:100, cls:'title-vanguard'},
      {name:'Slayer',    min:60,  cls:'title-slayer'},
      {name:'Duelist',   min:25,  cls:'title-duelist'},
      {name:'Initiate',  min:10,  cls:'title-initiate'},
      {name:'Challenger',min:0,   cls:'title-challenger'},
    ];

    let playersData = [], sortedOverall = [], currentMode = 'Overall';

    function getTitle(pts) { return titles.find(t => pts >= t.min) || titles[titles.length-1]; }
    function clean(v) { return (v||'').trim().toUpperCase().replace(/R$/,''); }

    async function init() {
      Papa.parse(CSV_URL, {
        download:true, header:true, skipEmptyLines:true,
        complete(r) {
          playersData = r.data.filter(p=>p.IGN).map(p => {
            let score = 0;
            modeKeys.forEach(m => { score += basePoints[clean(p[m])] || 0; });
            return { ...p, totalPoints: score };
          });
          sortedOverall = [...playersData].sort((a,b)=>b.totalPoints-a.totalPoints);
          updateView('Overall');
        }
      });
    }

    function closeModal() {
      document.getElementById('modal-overlay').classList.remove('open');
    }

    function showRanksModal() {
      const rows = titles.map(t => {
        const range = t.min === 0 ? '0 – 9 PTS' : `${t.min}+ PTS`;
        return `<div class="rank-row">
          <span class="rank-name ${t.cls}">${t.name}</span>
          <span class="rank-pts">${range}</span>
        </div>`;
      }).join('');
      showInfoModal('Player Ranks','Points required per rank',`<div class="pts-scroll">${rows}</div>`);
    }

    function showPointSystem() {
      const rows = Object.entries(basePoints).map(([tier,pts])=>`
        <div class="pts-row">
          <span class="pts-tier ${tier}">${tier}</span>
          <span class="pts-val">${pts} PTS</span>
        </div>`).join('');
      showInfoModal('Point System','How scores are calculated',`<div class="pts-scroll">${rows}</div>`);
    }

    function showInfoModal(title, sub, body) {
      document.getElementById('modal-body').innerHTML = '';
      document.querySelector('.modal-box').outerHTML;
      // Repurpose the modal-box for info
      const overlay = document.getElementById('modal-overlay');
      overlay.innerHTML = `
        <div class="info-modal-box" onclick="event.stopPropagation()">
          <button class="modal-close" onclick="closeModal()">✕</button>
          <div class="info-modal-title">${title}</div>
          <div class="info-modal-sub">${sub}</div>
          ${body}
        </div>`;
      overlay.classList.add('open');
    }

    function openProfile(p) {
      // Rebuild modal-box in case it was replaced
      const overlay = document.getElementById('modal-overlay');
      overlay.innerHTML = `
        <div class="modal-box" onclick="event.stopPropagation()">
          <button class="modal-close" onclick="closeModal()">✕</button>
          <div class="modal-inner" id="modal-body"></div>
        </div>`;

      const body = document.getElementById('modal-body');
      const globalRank = sortedOverall.findIndex(x=>x.IGN===p.IGN)+1;
      const titleObj = getTitle(p.totalPoints);
      const region = (p.Region||'').trim() || '—';

      let ignClass = 'modal-ign';
      let ignStyle = 'color:#fff';
      if (globalRank===1) { ignClass+=' animate-flow flow-gold'; ignStyle=''; }
      else if (globalRank===2) { ignClass+=' animate-flow flow-silver'; ignStyle=''; }
      else if (globalRank===3) { ignClass+=' animate-flow flow-bronze'; ignStyle=''; }
      else if (p.Color && p.Color.trim()) {
        const c = p.Color.trim();
        if (c.toLowerCase().includes('gradient')) {
          ignStyle = `background:${c};-webkit-background-clip:text;-webkit-text-fill-color:transparent;`;
          ignClass += ' animate-flow';
        } else {
          ignStyle = `color:${c}`;
        }
      }

      const tabColor = (p.Tabcolor||'').trim();
      let glowAttr = '';
      if (tabColor) {
        if (tabColor.toLowerCase()==='animated') {
          glowAttr = `onmouseenter="this.style.animation='purpleBlueGlow 2s infinite ease-in-out'" onmouseleave="this.style.animation='none'"`;
        } else {
          glowAttr = `onmouseenter="this.style.filter='drop-shadow(0 0 18px ${tabColor}bb)'" onmouseleave="this.style.filter='drop-shadow(0 20px 30px rgba(0,0,0,0.6))'"`; 
        }
      }

      body.innerHTML = `
        <div class="modal-render">
          <img src="https://visage.surgeplay.com/full/350/${p.IGN}" ${glowAttr}
               onerror="this.src='${FALLBACK_FULL}'">
        </div>
        <div class="${ignClass}" style="${ignStyle}">${p.IGN}</div>
        <div class="modal-title-row">
          <span class="modal-title-text ${titleObj.cls}">${titleObj.name}</span>
          <span class="modal-region-pill">${region}</span>
        </div>
        <div class="mode-grid">
          ${modeKeys.map((k,i)=>`
            <div class="mode-pill">
              <div class="mode-label">${modeLabels[i]}</div>
              <div class="mode-val ${(p[k]||'').toUpperCase()}">${p[k]||'—'}</div>
            </div>`).join('')}
        </div>
        <div class="modal-stats">
          <div class="stat-row">
            <span class="stat-label">Global Score</span>
            <span class="stat-val">${p.totalPoints}</span>
          </div>
          <div class="stat-row">
            <span class="stat-label">Global Rank</span>
            <span class="stat-val">#${globalRank}</span>
          </div>
          <div class="stat-row">
            <span class="stat-label">Region</span>
            <span class="stat-region">${region}</span>
          </div>
        </div>
      `;
      overlay.classList.add('open');
    }

    function updateView(mode, el) {
      currentMode = mode;
      if (el) {
        document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
        el.classList.add('active');
      }
      const term = document.getElementById('search').value.toLowerCase();
      const filtered = playersData.filter(p=>p.IGN.toLowerCase().includes(term));
      const content = document.getElementById('main-content');
      content.innerHTML = '';

      if (mode === 'Overall') {
        const sorted = [...filtered].sort((a,b)=>b.totalPoints-a.totalPoints);
        sorted.forEach((p, i) => {
          const card = document.createElement('div');
          card.className = 'player-card';
          card.onclick = () => openProfile(p);

          let rankCls = '';
          if (!term) {
            if (i===0) rankCls='rank-gold';
            else if (i===1) rankCls='rank-silver';
            else if (i===2) rankCls='rank-bronze';
          }

          const titleObj = getTitle(p.totalPoints);
          const region = (p.Region||'').trim();

          card.innerHTML = `
            <div class="card-rank ${rankCls}">${i+1}</div>
            <img class="player-head" src="https://minotar.net/helm/${p.IGN}/44" onerror="this.src='${FALLBACK_HEAD}'">
            <div class="card-info">
              <div class="card-ign">${p.IGN}</div>
              <div class="card-sub">
                <span class="card-title ${titleObj.cls}">${titleObj.name}</span>
                <span class="card-pts">${p.totalPoints} pts</span>
                ${region ? `<span class="region-badge">${region}</span>` : ''}
              </div>
            </div>
            <div class="card-tiers">
              ${modeKeys.map((k,idx)=>p[k]?`
                <div class="tier-badge">
                  <div class="tier-icon-box"><img src="${iconPaths[idx]}"></div>
                  <span class="tier-badge-val ${(p[k]||'').toUpperCase()}">${p[k]}</span>
                </div>`:''
              ).join('')}
            </div>`;

          // Custom tab color hover
          const tc = (p.Tabcolor||'').trim();
          card.addEventListener('mouseenter', ()=>{
            if (tc.toLowerCase()==='animated') card.style.animation = 'purpleBlueGlow 2s infinite ease-in-out';
            else if (tc) { card.style.borderColor=tc; card.style.boxShadow=`0 8px 30px ${tc}44`; }
          });
          card.addEventListener('mouseleave', ()=>{
            card.style.animation='none'; card.style.borderColor=''; card.style.boxShadow='';
          });

          content.appendChild(card);
        });

      } else {
        const grid = document.createElement('div');
        grid.className = 'tier-grid';

        for (let i=1; i<=5; i++) {
          const col = document.createElement('div');
          const thCls = i<=3 ? `th${i}` : `th${i > 3 ? (i===4?'4':'5') : i}`;
          col.innerHTML = `<div class="tier-col-header th${Math.min(i,4)}">Tier ${i}</div>`;

          const tierPlayers = filtered.filter(p => {
            const c = clean(p[mode]);
            return c===`HT${i}` || c===`LT${i}`;
          }).sort((a,b)=>{
            const ca = clean(a[mode]), cb = clean(b[mode]);
            if (ca.startsWith('HT')&&cb.startsWith('LT')) return -1;
            if (ca.startsWith('LT')&&cb.startsWith('HT')) return 1;
            return a.IGN.localeCompare(b.IGN);
          });

          tierPlayers.forEach(p => {
            const div = document.createElement('div');
            div.className = 'mini-card';
            div.onclick = () => openProfile(p);
            div.innerHTML = `
              <img class="mini-head" src="https://minotar.net/helm/${p.IGN}/24" onerror="this.src='${FALLBACK_HEAD}'">
              <span class="mini-ign">${p.IGN}</span>
              <span class="mini-tier ${(p[mode]||'').toUpperCase()}">${p[mode]}</span>`;
            col.appendChild(div);
          });
          grid.appendChild(col);
        }
        content.appendChild(grid);
      }
    }

    document.getElementById('search').addEventListener('input', ()=>updateView(currentMode));
    init();
  </script>
</body>
</html>
